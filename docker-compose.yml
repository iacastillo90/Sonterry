name: sonterry

services:
  database:
    image: mongo:4.4
    container_name: sonterry_db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo_data:/data/db
    networks:
      - sonterry_network
    healthcheck:
      test: mongo --eval 'db.runCommand("ping").ok' --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: sonterry_cache
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - sonterry_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Back
      dockerfile: Dockerfile
    container_name: sonterry_api
    restart: unless-stopped
    ports:
      - "${PORT_API:-5000}:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASS}@database:27017/mi-ecommerce?authSource=admin
      - MONGO_MAX_POOL_SIZE=50
      - MONGO_MIN_POOL_SIZE=5
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=1d
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_API_URL=https://api-m.sandbox.paypal.com
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET:-sonterry}
      - MINIO_USE_SSL=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - WOMPI_PUBLIC_KEY=${WOMPI_PUBLIC_KEY:-}
      - WOMPI_PRIVATE_KEY=${WOMPI_PRIVATE_KEY:-}
      - WOMPI_INTEGRITY_KEY=${WOMPI_INTEGRITY_KEY:-}
      - WOMPI_EVENTOS_SECRET=${WOMPI_EVENTOS_SECRET:-}
      - WOMPI_API_URL=https://sandbox.wompi.co
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/dispatch-notification
      - N8N_API_KEY=${N8N_API_KEY}
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - CORS_ORIGIN=${CLIENT_URL:-http://localhost:5173},http://localhost:3000
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - sonterry_network

